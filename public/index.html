    <title>marching.art - The Ultimate Fantasy Drum Corps Game</title>
    
    <!-- Inline critical CSS for faster loading -->
    <style>
      /* Critical CSS for initial paint */
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FAF0F0; /* Light cream background */
        color: #1E1E1E;
        overflow-x: hidden;
      }
      
      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0F0C0A; /* Dark brown background */
          color: #F8FAFC;
        }
      }
      
      /* Loading spinner for initial app load */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 1rem;
      }
      
      .loading-logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #F7941D, #8B4513);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      .loading-text {
        color: #F7941D;
        font-weight: 600;
        font-size: 1.125rem;
      }
      
      /* Hide loading once React loads */
      #root:not(:empty) ~ .app-loading {
        display: none;
      }
      
      /* Safe area handling for modern devices */
      .safe-area-inset {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      
      /* Prevent horizontal scroll on mobile */
      html, body {
        overflow-x: hidden;
        width: 100%;
      }
      
      /* Touch optimization */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: Inter, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>marching.art requires JavaScript to run. Please enable JavaScript in your browser.</p>
      </div>
    </noscript>
    
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Loading fallback -->
    <div class="app-loading">
      <div class="loading-logo">🎺</div>
      <div class="loading-text">Loading marching.art...</div>
    </div>
    
    <!-- PWA Install Prompt Script -->
    <script>
      // PWA install prompt handling
      let deferredPrompt;
      let installButton;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent Chrome 67 and earlier from automatically showing the prompt
        e.preventDefault();
        // Stash the event so it can be triggered later
        deferredPrompt = e;
        
        // Show install button
        showInstallButton();
      });
      
      function showInstallButton() {
        // Create install button if it doesn't exist
        if (!installButton && !window.matchMedia('(display-mode: standalone)').matches) {
          installButton = document.createElement('button');
          installButton.innerHTML = '📱 Install App';
          installButton.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #F7941D;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(247, 148, 29, 0.3);
            font-family: Inter, sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
          `;
          
          installButton.addEventListener('click', installApp);
          installButton.addEventListener('mouseenter', () => {
            installButton.style.transform = 'translateY(-2px)';
            installButton.style.boxShadow = '0 6px 16px rgba(247, 148, 29, 0.4)';
          });
          installButton.addEventListener('mouseleave', () => {
            installButton.style.transform = 'translateY(0)';
            installButton.style.boxShadow = '0 4px 12px rgba(247, 148, 29, 0.3)';
          });
          
          document.body.appendChild(installButton);
        }
      }
      
      async function installApp() {
        if (deferredPrompt) {
          // Show the prompt
          deferredPrompt.prompt();
          // Wait for the user to respond to the prompt
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`User response to the install prompt: ${outcome}`);
          // Clear the deferredPrompt
          deferredPrompt = null;
          // Hide install button
          if (installButton) {
            installButton.remove();
            installButton = null;
          }
        }
      }
      
      // Handle successful installation
      window.addEventListener('appinstalled', (evt) => {
        console.log('marching.art was installed');
        if (installButton) {
          installButton.remove();
          installButton = null;
        }
      });
      
      // Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
      
      // Hide splash screen once app loads
      window.addEventListener('load', () => {
        const loading = document.querySelector('.app-loading');
        if (loading && document.getElementById('root').children.length > 0) {
          loading.style.display = 'none';
        }
      });
    </script>
  </body>
