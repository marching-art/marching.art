<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#DAA520" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="The ultimate fantasy drum corps game. Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta name="keywords" content="drum corps, DCI, fantasy game, marching band, marching arts, drum corps international" />
    <meta name="author" content="marching.art" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marching.art/" />
    <meta property="og:title" content="marching.art - The Ultimate Fantasy Drum Corps Game" />
    <meta property="og:description" content="Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://marching.art/" />
    <meta property="twitter:title" content="marching.art" />
    <meta property="twitter:description" content="Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta property="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    
    <title>marching.art - The Ultimate Fantasy Drum Corps Game</title>
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FFFAF0;
        color: #1E140F;
        overflow-x: hidden;
      }
      
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #140F0A;
          color: #FFFAF0;
        }
      }
      
      /* Simple pulsing loading screen */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      
      .loading-brand {
        font-size: 3.75rem;
        font-weight: 700;
        color: #DAA520;
        animation: pulse 2s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      
      #root:not(:empty) ~ .app-loading {
        display: none;
      }
      
      html, body {
        overflow-x: hidden;
        width: 100%;
      }
      
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: Inter, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>marching.art requires JavaScript to run. Please enable JavaScript in your browser.</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Simple pulsing loading screen -->
    <div class="app-loading">
      <div class="loading-brand">marching.art</div>
    </div>
  </body>
</html>
