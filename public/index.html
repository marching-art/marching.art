<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#DAA520" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="The ultimate fantasy drum corps game. Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta name="keywords" content="drum corps, DCI, fantasy game, marching band, marching arts, drum corps international" />
    <meta name="author" content="marching.art" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marching.art/" />
    <meta property="og:title" content="marching.art - The Ultimate Fantasy Drum Corps Game" />
    <meta property="og:description" content="Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://marching.art/" />
    <meta property="twitter:title" content="marching.art" />
    <meta property="twitter:description" content="Build your dream corps, compete with friends, and become a legend in the marching arts." />
    <meta property="twitter:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    
    <title>marching.art - The Ultimate Fantasy Drum Corps Game</title>
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FFFAF0;
        color: #1E140F;
        overflow-x: hidden;
      }
      
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #140F0A;
          color: #FFFAF0;
        }
      }
      
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 2rem;
      }
      
      .loading-rings {
        position: relative;
        width: 128px;
        height: 128px;
      }
      
      .loading-ring {
        position: absolute;
        border: 4px solid transparent;
        border-radius: 50%;
      }
      
      .loading-ring-outer {
        inset: 0;
        border-top-color: #DAA520;
        animation: spin 2s linear infinite;
      }
      
      .loading-ring-middle {
        inset: 16px;
        border-right-color: #DAA520;
        border-left-color: #DAA520;
        opacity: 0.6;
        animation: spin 1.5s linear infinite reverse;
      }
      
      .loading-ring-inner {
        inset: 32px;
        border-bottom-color: #DAA520;
        animation: spin 1s linear infinite;
      }
      
      .loading-center-dot {
        position: absolute;
        inset: 48px;
        background: linear-gradient(135deg, #DAA520, #8B4513);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loading-brand {
        color: #DAA520;
        font-weight: 700;
        font-size: 3rem;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
      }
      
      .loading-divider {
        width: 192px;
        height: 4px;
        background: linear-gradient(to right, transparent, #DAA520, transparent);
        border-radius: 2px;
        margin-bottom: 1rem;
      }
      
      .loading-message {
        color: #8B5A3C;
        font-weight: 500;
        font-size: 1.125rem;
        margin-bottom: 1rem;
      }
      
      @media (prefers-color-scheme: dark) {
        .loading-message {
          color: #CDAF95;
        }
      }
      
      .loading-dots {
        display: flex;
        gap: 0.5rem;
      }
      
      .loading-dot {
        width: 12px;
        height: 12px;
        background: #DAA520;
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }
      
      .loading-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      
      .loading-dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-12px); }
      }
      
      #root:not(:empty) ~ .app-loading {
        display: none;
      }
      
      html, body {
        overflow-x: hidden;
        width: 100%;
      }
      
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: Inter, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>marching.art requires JavaScript to run. Please enable JavaScript in your browser.</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <div class="app-loading">
      <div class="loading-rings">
        <div class="loading-ring loading-ring-outer"></div>
        <div class="loading-ring loading-ring-middle"></div>
        <div class="loading-ring loading-ring-inner"></div>
        <div class="loading-center-dot"></div>
      </div>
      <div style="text-align: center;">
        <div class="loading-brand">marching.art</div>
        <div class="loading-divider"></div>
        <div class="loading-message">Loading your experience...</div>
        <div class="loading-dots">
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
          <div class="loading-dot"></div>
        </div>
      </div>
    </div>
  </body>
</html>
