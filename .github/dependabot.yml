# Dependabot keeps dependencies patched and surfaces vulnerable transitive
# packages as update PRs. One npm entry per package.json in the repo, plus the
# GitHub Actions workflows. Updates are grouped so a week's bumps arrive as a
# couple of PRs instead of dozens; security updates still open individually.
version: 2
updates:
  # --- Frontend (root) ---
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Tailwind v4 is a ground-up rewrite: the PostCSS plugin moved to a
      # separate @tailwindcss/postcss package and config went CSS-first, so a
      # bare version bump breaks the build (the old `tailwindcss: {}` PostCSS
      # plugin no longer exists). We stay on v3 deliberately; v4 is a planned
      # migration, not an automated bump. Closed PR #1121.
      - dependency-name: tailwindcss
        update-types: [version-update:semver-major]
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]

  # --- Cloud Functions ---
  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        update-types: [minor, patch]

  # --- Firestore rules tests ---
  - package-ecosystem: npm
    directory: /firestore-tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-dependencies:
        update-types: [minor, patch]

  # --- Scraper ---
  - package-ecosystem: npm
    directory: /functions-scraper
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-dependencies:
        update-types: [minor, patch]

  # --- Scripts ---
  - package-ecosystem: npm
    directory: /scripts
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-dependencies:
        update-types: [minor, patch]

  # --- GitHub Actions used by the workflows ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types: [minor, patch]
