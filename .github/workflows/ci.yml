name: CI

# Runs on every pull request into main and on pushes to main. This is the
# merge gate: at minimum the app must still build. `test` and `typecheck`
# also run here so their status is visible on every PR.
#
# NOTE ON REQUIRED CHECKS: all five jobs — build, test, typecheck, lint, and
# functions — are green, so every one is safe to mark as a required status check
# in branch protection. (ESLint reports 0 errors; remaining items are non-fatal
# warnings. Storybook *.stories.tsx are excluded from tsc and still need updating
# to the current component APIs — separate, non-blocking work.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Coverage runs the same vitest suite; the text summary in the job log
      # keeps the coverage gap visible on every PR without gating on it.
      - name: Run tests with coverage
        run: npm run test:coverage

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
      # Prettier is intentionally not enforced here yet: the existing codebase
      # has not been run through it. After a one-time `npm run format` pass
      # (its own dedicated PR), add `npm run format:check` as a step and
      # promote it to a required check.

  functions:
    name: Functions check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Syntax-check function sources
        run: cd functions && node --check index.js && find src -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run function unit tests
        run: cd functions && npm test
