name: CI

# Runs on every pull request into main and on pushes to main. This is the
# merge gate: at minimum the app must still build. `test` and `typecheck`
# also run here so their status is visible on every PR.
#
# NOTE ON REQUIRED CHECKS: the repo currently carries pre-existing test
# failures, TypeScript errors, and lint violations (component/test drift,
# stale Storybook stories, missing @types, legacy style issues). Until those
# are cleared, mark ONLY the `build` job as a required status check in branch
# protection. Once `test`, `typecheck`, and `lint` are green, promote them to
# required as well.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
      # Prettier is intentionally not enforced here yet: the existing codebase
      # has not been run through it. After a one-time `npm run format` pass
      # (its own dedicated PR), add `npm run format:check` as a step and
      # promote it to a required check.

  functions:
    name: Functions install check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Syntax-check function sources
        run: cd functions && node --check index.js && find src -name '*.js' -print0 | xargs -0 -n1 node --check
