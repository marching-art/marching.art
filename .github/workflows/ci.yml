name: CI

# Runs on every pull request into main and on pushes to main. This is the
# merge gate: at minimum the app must still build. `test` and `typecheck`
# also run here so their status is visible on every PR.
#
# NOTE ON REQUIRED CHECKS: all seven jobs — build, test, typecheck, lint,
# functions, rules, and e2e — are green, so every one is safe to mark as a
# required status check in branch protection. (ESLint reports 0 errors;
# remaining items are non-fatal warnings.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Coverage runs the same vitest suite. This DOES gate: vite.config.js
      # sets ratcheted coverage thresholds, so the job fails if coverage drops
      # below the committed baseline. The text summary in the job log keeps
      # the coverage gap visible on every PR.
      - name: Run tests with coverage
        run: npm run test:coverage

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Enforced now that the one-time format pass has landed. The Cloud
      # Functions codebases are excluded via .prettierignore (they use their
      # own ESLint-enforced style).
      - name: Prettier
        run: npm run format:check

      # Design-system ratchet: the visual-identity unification may only
      # converge. Fails if any violation count rose above the committed
      # baseline (scripts/design-census.baseline.json). See
      # docs/DESIGN_SYSTEM.md.
      - name: Design-system ratchet
        run: npm run census:check

      # The class registry ships as two committed copies (functions cannot
      # import outside their deploy root); they must stay byte-identical.
      # Fails if src/config/classRegistry.json drifts from the canonical
      # functions/src/config/classRegistry.json.
      - name: Class-registry mirror check
        run: node scripts/checkClassRegistrySync.js

      # Firestore-path ratchet: hand-written `artifacts/...` string literals
      # may only decrease (use the paths helpers instead). Fails if any file
      # rose above scripts/path-literals.baseline.json.
      - name: Firestore path-literal ratchet
        run: node scripts/checkPathLiterals.mjs

      # ts-nocheck ratchet: the count of `@ts-nocheck` file headers may only
      # decrease. Fails if it rose above the committed baseline
      # (see scripts/tsNocheckCensus.mjs).
      - name: ts-nocheck ratchet
        run: npm run ts-nocheck:check

  functions:
    name: Functions check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Syntax-check function sources
        run: cd functions && node --check index.js && find src -name '*.js' -print0 | xargs -0 -n1 node --check

      # Coverage instead of plain `npm test`: same node --test suite, plus an
      # --experimental-test-coverage summary printed to the job log. This is
      # informational only — no thresholds, nothing gates on it.
      - name: Run function unit tests with coverage
        run: cd functions && npm run test:coverage

  # Firestore security-rules regression suite against the emulator. This suite
  # exists because a rules regression once shipped (the user-subcollection
  # catch-all bypassed the profile protected-field guards); running it only on
  # developer machines re-opens that door.
  rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: firestore-tests/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # The Firestore emulator JAR (~60 MB) downloads on first run; cache it.
      - name: Cache Firestore emulator
        uses: actions/cache@v6
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-${{ hashFiles('firestore-tests/package-lock.json') }}

      - name: Install rules-test dependencies
        run: cd firestore-tests && npm ci

      - name: Run rules tests against the emulator
        run: cd firestore-tests && npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache the downloaded browser binaries (~150 MB), keyed on the
      # Playwright version pinned in package-lock.json. On a hit only the OS
      # packages need installing; on a miss the full install repopulates the
      # cache.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The e2e specs are unauthenticated smoke tests (landing, auth forms,
      # routing/redirects), so dummy Firebase config is enough for the dev
      # server to boot — no real project credentials are needed or used.
      - name: Run e2e tests
        env:
          VITE_FIREBASE_API_KEY: fake-api-key-for-e2e
          VITE_FIREBASE_AUTH_DOMAIN: demo-e2e.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: demo-e2e
          VITE_FIREBASE_STORAGE_BUCKET: demo-e2e.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
