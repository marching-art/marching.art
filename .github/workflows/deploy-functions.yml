name: Deploy Cloud Functions

on:
  # Manual trigger from GitHub UI with options
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - single
          - scraper
      function_names:
        description: 'Function names (comma-separated, only for "single" target)'
        required: false
        type: string

jobs:
  deploy-all:
    if: inputs.deploy_target == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: |
          cd functions && npm ci
          cd ../functions-scraper && npm ci

      - name: Deploy functions in batches
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account key to temp file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          DELAY_SECONDS=75
          FAILED_BATCHES=()

          # Batch ordering: score-critical functions first
          BATCHES=(
            "scrapeDciScores,processDailyLiveScores,dailyOffSeasonProcessor,processLiveScoreRecap,processDciScores"
            "processPaginationPage,onFantasyRecapUpdated,processNewsGeneration,triggerNewsGeneration,triggerDailyNews"
            "seasonScheduler,updateLifetimeLeaderboard,scheduledLifetimeLeaderboardUpdate,generateWeeklyMatchups"
            "generateWeeklyRecaps,updateLeagueRivalries,triggerMatchupGeneration"
            "getDailyNews,getRecentNews,listAllArticles,getArticleForEdit,updateArticle,archiveArticle"
            "deleteArticle,regenerateArticleImage,submitNewsForApproval,listPendingSubmissions,approveSubmission,rejectSubmission"
            "weeklyDigestEmailJob,winBackEmailJob,streakBrokenEmailJob"
            "showReminderPushJob,weeklyMatchupPushJob"
            "onLeagueMemberJoined,onLeagueChatMessage,onProfileCreated,onStreakMilestoneReached"
            "onUniformDesignUpdated,generateCorpsAvatar,regenerateAllAvatars"
            "checkUsername,setUserRole,getShowRegistrations,getUserRankings,migrateUserProfiles"
            "createUserProfile,dailyXPCheckIn,awardXP,fixProfileFields,updateProfile,getPublicProfile"
            "updateUsername,updateEmail,deleteAccount"
            "validateAndSaveLineup,saveLineup,selectUserShows,saveShowConcept,getLineupAnalytics,getHotCorps"
            "unlockClassWithCorpsCoin,getCorpsCoinHistory,getEarningOpportunities,registerCorps"
            "processCorpsDecisions,retireCorps,unretireCorps"
            "createLeague,joinLeague,joinLeagueByCode,leaveLeague,generateMatchups,updateMatchupResults"
            "postLeagueMessage"
            "sendCommentNotification,deleteComment,reportComment,claimDailyLogin,purchaseStreakFreeze,getStreakStatus"
            "toggleArticleReaction,getArticleReactions,getArticleEngagement"
            "addArticleComment,getArticleComments,editArticleComment,deleteArticleComment,reportArticleComment"
            "listCommentsForModeration,moderateComment,bulkModerateComments"
            "startNewOffSeason,startNewLiveSeason,manualTrigger,sendTestEmail,stripeWebhook"
            "searchYoutubeVideo"
          )

          TOTAL_BATCHES=${#BATCHES[@]}
          CURRENT_BATCH=0

          echo "Deploying $TOTAL_BATCHES batches of Cloud Functions..."
          echo ""

          for batch in "${BATCHES[@]}"; do
            CURRENT_BATCH=$((CURRENT_BATCH + 1))
            FUNCTIONS_TO_DEPLOY=$(echo "$batch" | sed 's/,/,functions:/g' | sed 's/^/functions:/')

            echo "::group::[$CURRENT_BATCH/$TOTAL_BATCHES] Deploying: $batch"

            if firebase deploy --only "$FUNCTIONS_TO_DEPLOY" --force --project marching-art; then
              echo "Batch $CURRENT_BATCH completed successfully"
            else
              echo "::error::Batch $CURRENT_BATCH failed: $batch"
              FAILED_BATCHES+=("$batch")
            fi

            echo "::endgroup::"

            # Delay between batches (except last)
            if [ $CURRENT_BATCH -lt $TOTAL_BATCHES ]; then
              echo "Waiting $DELAY_SECONDS seconds before next batch..."
              sleep $DELAY_SECONDS
            fi
          done

          # Cleanup
          rm -f /tmp/sa-key.json

          # Summary
          echo ""
          echo "=========================================="
          echo "Deployment Summary"
          echo "=========================================="
          echo "Total batches: $TOTAL_BATCHES"
          echo "Successful: $((TOTAL_BATCHES - ${#FAILED_BATCHES[@]}))"
          echo "Failed: ${#FAILED_BATCHES[@]}"

          if [ ${#FAILED_BATCHES[@]} -gt 0 ]; then
            echo ""
            echo "Failed batches:"
            for failed in "${FAILED_BATCHES[@]}"; do
              echo "  - $failed"
            done
            exit 1
          else
            echo "All functions deployed successfully!"
          fi

  deploy-single:
    if: inputs.deploy_target == 'single' && inputs.function_names != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy specific functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          # Convert comma-separated input to firebase format
          FUNCTIONS=$(echo "${{ inputs.function_names }}" | sed 's/ //g' | sed 's/,/,functions:/g' | sed 's/^/functions:/')

          echo "Deploying functions: ${{ inputs.function_names }}"
          firebase deploy --only "$FUNCTIONS" --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Deployment successful!"

  deploy-scraper:
    if: inputs.deploy_target == 'scraper'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions-scraper/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install scraper dependencies
        run: cd functions-scraper && npm ci

      - name: Deploy scraper functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          firebase deploy --only functions:scraper --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Scraper functions deployed successfully!"
