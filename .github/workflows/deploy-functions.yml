name: Deploy Cloud Functions

on:
  # Manual trigger from GitHub UI with options
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - single
          - scraper
      function_names:
        description: 'Function names (comma-separated, only for "single" target)'
        required: false
        type: string

jobs:
  deploy-all:
    if: inputs.deploy_target == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: |
          cd functions && npm ci
          cd ../functions-scraper && npm ci

      - name: Deploy all functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account key to temp file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          # Single-pass deploy of every codebase (default + scraper). firebase-tools
          # already deploys functions in parallel waves, skips unchanged functions,
          # and retries on quota (429) with backoff internally — so the old 24-batch
          # + fixed-sleep approach was just adding ~30 min of unnecessary waiting.
          # We add a small outer retry loop to ride out any quota errors that
          # exhaust the CLI's internal retries; re-runs are cheap because already
          # deployed functions are skipped.
          MAX_ATTEMPTS=3
          ATTEMPT=1
          DELAY=30

          until firebase deploy --only functions --force --project marching-art; do
            if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::Function deployment failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            echo "Deploy attempt $ATTEMPT failed (likely transient/quota). Retrying in ${DELAY}s..."
            sleep "$DELAY"
            ATTEMPT=$((ATTEMPT + 1))
            DELAY=$((DELAY * 2))
          done

          echo "All functions deployed successfully!"

  deploy-single:
    if: inputs.deploy_target == 'single' && inputs.function_names != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy specific functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          # Convert comma-separated input to firebase format
          FUNCTIONS=$(echo "${{ inputs.function_names }}" | sed 's/ //g' | sed 's/,/,functions:/g' | sed 's/^/functions:/')

          echo "Deploying functions: ${{ inputs.function_names }}"
          firebase deploy --only "$FUNCTIONS" --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Deployment successful!"

  deploy-scraper:
    if: inputs.deploy_target == 'scraper'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions-scraper/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install scraper dependencies
        run: cd functions-scraper && npm ci

      - name: Deploy scraper functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          firebase deploy --only functions:scraper --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Scraper functions deployed successfully!"
