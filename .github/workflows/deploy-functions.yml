name: Deploy Cloud Functions

on:
  # Manual trigger from GitHub UI with options
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - single
          - scraper
          - rules-only
      function_names:
        description: 'Function names (comma-separated, only for "single" target)'
        required: false
        type: string
      run_email_cleanup:
        description: 'One-off: strip leaked emails from public profile docs (idempotent; leave unchecked after running once)'
        required: false
        default: false
        type: boolean
      run_historical_import:
        description: 'One-off: import 2000-2012 historical recaps from functions/pressboxImporter/output (add-only; skips years that already exist)'
        required: false
        default: false
        type: boolean
      historical_import_dry_run:
        description: 'Historical import: preview only (uncheck to actually write to Firestore)'
        required: false
        default: true
        type: boolean
      historical_import_args:
        description: 'Extra args for pressboxImporter/import.js (e.g. "--years 2000,2001", "--merge")'
        required: false
        default: ''
        type: string
      run_archive_name_import:
        description: 'One-off: overwrite "DCI Competition - ..." placeholder show names in historical_scores with official archive.org names (functions/dciArchiveImporter; add-only, only touches placeholders)'
        required: false
        default: false
        type: boolean
      archive_name_import_dry_run:
        description: 'Archive name import: preview only (uncheck to actually write to Firestore)'
        required: false
        default: true
        type: boolean
      archive_name_import_args:
        description: 'Extra args for dciArchiveImporter/apply.js (e.g. "--years 2003,2009")'
        required: false
        default: ''
        type: string
      set_scraper_api_key:
        description: 'One-off: push the SCRAPER_API_KEY repo secret into Google Secret Manager (check when first adding or rotating the scraping-provider key, e.g. ScrapingAnt, then leave unchecked). Requires deploy_target=all so the functions redeploy and pick up the new value.'
        required: false
        default: false
        type: boolean

jobs:
  # Gate: every deploy path that ships function code must pass the functions
  # test suite (same commands as the CI "functions" job) on the exact ref
  # being deployed. workflow_dispatch can run from ANY ref — including a
  # branch that never went through PR CI — and before this gate a broken
  # commit could deploy all ~150 production functions, nightly scoring
  # pipeline included, without a single test running.
  test-functions:
    if: contains(fromJSON('["all", "single", "scraper"]'), inputs.deploy_target)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Syntax-check function sources
        run: |
          cd functions && node --check index.js && find src -name '*.js' -print0 | xargs -0 -n1 node --check
          node --check ../functions-scraper/index.js

      - name: Run function unit tests
        run: cd functions && npm test

  deploy-all:
    if: inputs.deploy_target == 'all'
    needs: test-functions
    runs-on: ubuntu-latest
    # Batched function deploys are paced to stay under the Cloud Run
    # write-per-minute quota, so a full deploy of every changed function can
    # run ~35 min; give it headroom over the previous all-at-once budget.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: |
          cd functions && npm ci
          cd ../functions-scraper && npm ci

      # Push the ScrapingBee key into Google Secret Manager before deploying, so
      # the functions that declare `secrets: [scraperApiKey]` bind the new value
      # on the deploy below. Firebase v2 secrets live in Secret Manager (not
      # .env), and a changed value only takes effect after a redeploy — which is
      # why this is gated on deploy_target=all. Runs only when the box is checked;
      # leave it unchecked on normal deploys. The value is piped via stdin so it
      # never lands in the logs or process list, and GitHub masks the secret too.
      - name: Set SCRAPER_API_KEY in Secret Manager
        if: ${{ inputs.set_scraper_api_key }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          if [ -z "$SCRAPER_API_KEY" ]; then
            echo "::error::set_scraper_api_key was checked but the SCRAPER_API_KEY repo secret is empty. Add it under Settings → Secrets and variables → Actions → New repository secret, then re-run."
            exit 1
          fi
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          printf '%s' "$SCRAPER_API_KEY" | \
            firebase functions:secrets:set SCRAPER_API_KEY --data-file - --project marching-art
          echo "SCRAPER_API_KEY written to Secret Manager; the deploy below will bind it to the functions."

      - name: Deploy Firestore rules + all functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write service account key to temp file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          # 1) Ship Firestore rules first (one cheap operation). Rules live in
          #    firestore.rules (wired in firebase.json) so security-rule changes
          #    actually deploy — functions alone would leave them stale.
          #    firestore:indexes is intentionally NOT included: `--force` would
          #    delete any console-managed indexes missing from
          #    firestore.indexes.json.
          firebase deploy --only firestore:rules --force --project marching-art

          # 2) Deploy all functions in a single operation. Firebase diffs the
          #    source and only updates functions that actually changed, so an
          #    incremental redeploy touches just the changed set. NOTE: a full
          #    redeploy of every function (e.g. a runtime bump) fans out ~2
          #    run.googleapis.com regional writes per function at once, which can
          #    exceed the "Write requests per minute per region" quota
          #    (INSUFFICIENT_TOKENS) and leave functions half-deployed. Cloud
          #    Build also occasionally fails a single function with a transient
          #    "An unexpected error occurred" build error. Both cases leave the
          #    deploy partially done and exit non-zero.
          #
          #    Retry the deploy a few times to self-heal these transient
          #    partial failures instead of requiring a manual re-run. This is
          #    safe: `firebase deploy` re-diffs the source on every attempt and
          #    skips functions already up to date, so each retry only re-attempts
          #    whatever failed last time. Only a failure that persists across all
          #    attempts fails the job.
          MAX_ATTEMPTS=3
          attempt=1
          until firebase deploy --only functions --force --project marching-art; do
            if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::firebase deploy --only functions failed after $MAX_ATTEMPTS attempts."
              exit 1
            fi
            # Back off before retrying so any per-minute write quota refills and
            # transient Cloud Build failures have time to clear.
            backoff=$((attempt * 60))
            echo "::warning::functions deploy attempt $attempt failed; retrying in ${backoff}s (already-deployed functions are skipped)..."
            sleep "$backoff"
            attempt=$((attempt + 1))
          done

          echo "All functions and Firestore rules deployed successfully!"

  deploy-single:
    if: inputs.deploy_target == 'single' && inputs.function_names != ''
    needs: test-functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Deploy specific functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          # Convert comma-separated input to firebase format
          FUNCTIONS=$(echo "${{ inputs.function_names }}" | sed 's/ //g' | sed 's/,/,functions:/g' | sed 's/^/functions:/')

          echo "Deploying functions: ${{ inputs.function_names }}"
          firebase deploy --only "$FUNCTIONS" --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Deployment successful!"

  deploy-scraper:
    if: inputs.deploy_target == 'scraper'
    needs: test-functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions-scraper/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install scraper dependencies
        run: cd functions-scraper && npm ci

      - name: Deploy scraper functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          firebase deploy --only functions:scraper --force --project marching-art

          rm -f /tmp/sa-key.json
          echo "Scraper functions deployed successfully!"

  # One-off data migration: remove email fields that were historically written
  # into the world-readable profile/data doc. Runs whenever the
  # "run_email_cleanup" box is checked, independent of the deploy target. The
  # script is idempotent (docs without an email field are skipped), so leaving
  # the box unchecked on future runs is safe. Uses the Admin SDK, so it bypasses
  # security rules and does not depend on the functions/rules deploy above.
  email-cleanup:
    if: ${{ inputs.run_email_cleanup }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Strip leaked emails from public profile docs
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATA_NAMESPACE: marching-art
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          node functions/src/scripts/cleanupLeakedProfileEmails.js

  # One-off data import: backfill historical_scores/{year} and
  # final_rankings/{year} for 2000-2012 from the parsed From The Pressbox
  # data committed under functions/pressboxImporter/output/. Runs whenever
  # "run_historical_import" is checked, independent of the deploy target.
  # import.js is add-only by default (years that already have documents are
  # skipped), so re-running is safe. The dry-run checkbox (default ON)
  # previews the writes without touching Firestore; it is a boolean input
  # because emptying a text input in the run-workflow UI silently restores
  # its default, which made a "--dry-run" text default impossible to clear.
  # Uses the Admin SDK directly, so it does not depend on the deploy above.
  import-historical-recaps:
    if: ${{ inputs.run_historical_import }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Import 2000-2012 historical recaps
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          node functions/pressboxImporter/import.js ${{ inputs.historical_import_dry_run && '--dry-run' || '' }} ${{ inputs.historical_import_args }}

  # One-off data update: overwrite the "DCI Competition - {City, State}"
  # placeholder eventNames in historical_scores/{year} (2000-2012) with the
  # official show names recovered from archive.org, matched on date + city.
  # Runs whenever "run_archive_name_import" is checked, independent of the
  # deploy target. apply.js --firestore re-plans against the live documents and
  # only rewrites placeholders (and completes abbreviated city names), so it
  # never touches scores or already-titled events and is safe to re-run. The
  # dry-run checkbox (default ON) previews counts without writing. Uses the
  # Admin SDK directly, so it does not depend on the deploy above.
  apply-archive-names:
    if: ${{ inputs.run_archive_name_import }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: cd functions && npm ci

      - name: Apply official archive.org show names
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          node functions/dciArchiveImporter/apply.js --firestore ${{ inputs.archive_name_import_dry_run && '--dry-run' || '' }} ${{ inputs.archive_name_import_args }}

  # Fast path for security-rule changes (e.g. flag-day tweaks): ships
  # firestore.rules alone without redeploying every function. Indexes stay
  # excluded here too — `--force` would delete console-managed indexes
  # missing from firestore.indexes.json.
  deploy-rules-only:
    if: inputs.deploy_target == 'rules-only'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          trap 'rm -f /tmp/sa-key.json' EXIT

          firebase deploy --only firestore:rules --force --project marching-art
