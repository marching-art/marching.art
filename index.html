    <link rel="preconnect" href="https://firebasestorage.googleapis.com">

    <!-- Google Fonts - Non-blocking load with optimized weights
         Moved from CSS @import to <link> for better LCP (non-render-blocking)
         Reduced from 9 weights to 6 weights (~40KB savings) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <title>marching.art — Fantasy Drum Corps | Draft DCI Lineups &amp; Compete</title>

    <!-- Structured Data (JSON-LD) - Helps search engines understand the app
         despite the SPA architecture. Covers Organization, WebSite, and
         WebApplication schemas for rich results eligibility. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://marching.art/#organization",
          "name": "marching.art",
          "url": "https://marching.art/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://marching.art/logo512.png",
            "width": 512,
            "height": 512
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://marching.art/#website",
          "url": "https://marching.art/",
          "name": "marching.art",
          "description": "Fantasy drum corps game — draft legendary DCI lineups and compete with directors worldwide.",
          "publisher": { "@id": "https://marching.art/#organization" },
          "inLanguage": "en-US"
        },
        {
          "@type": "WebApplication",
          "@id": "https://marching.art/#webapp",
          "name": "marching.art",
          "url": "https://marching.art/",
          "description": "Build your dream drum corps from 50 years of DCI history. Draft captions across GE, Visual, and Music, then compete on the live scoreboard with directors worldwide.",
          "applicationCategory": "GameApplication",
          "applicationSubCategory": "Fantasy Sports",
          "operatingSystem": "Web",
          "browserRequirements": "Requires JavaScript",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": { "@id": "https://marching.art/#organization" }
        }
      ]
    }
    </script>

    <!-- Critical CSS for App Loader - Matches React LoadingScreen exactly -->
    <style>
      /* =================================================================
         Dark theme base - prevents white flash on load.
         Scrolling is controlled per-page via CSS/JS.
         ================================================================= */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0A0A0A;
        color-scheme: dark;
      }

      /* Default: allow normal document scrolling for public pages */
      #root {
        min-height: 100vh;
        width: 100%;
      }

      /* GameShell pages use this class to enable fixed one-screen layout */
      html.game-shell-active {
        height: 100%;
        overflow: hidden;
      }
      html.game-shell-active body {
        height: 100%;
        overflow: hidden;
      }
      html.game-shell-active #root {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* App Loader - Official Drill Grid Logo */
      .app-loader {
        position: fixed;
        inset: 0;
        background-color: #0A0A0A; /* charcoal-950 */
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .app-loader svg {
        width: 96px;  /* w-24 = 6rem = 96px */
        height: 96px;
        color: #EAB308; /* gold-500 */
      }

      .app-loader-text {
        margin-top: 24px;
        font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
        font-size: 12px;
        color: rgba(234, 179, 8, 0.5); /* text-gold-500/50 */
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Pulse animation matching Tailwind's animate-pulse */
      .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* Hide loader when app loads */
      .app-loaded .app-loader {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="max-width: 720px; margin: 48px auto; padding: 24px; font-family: Inter, system-ui, sans-serif; color: #e5e5e5; line-height: 1.6;">
        <h1 style="color: #EAB308; font-size: 28px; margin-bottom: 12px;">marching.art — Fantasy Drum Corps</h1>
        <p style="font-size: 18px; margin-bottom: 16px;">
          Build your dream drum corps from 50 years of DCI history. Draft captions across General Effect,
          Visual, and Music, then compete on a live scoreboard with directors worldwide.
        </p>
        <h2 style="color: #EAB308; font-size: 20px; margin-top: 24px; margin-bottom: 8px;">How it works</h2>
        <ul style="font-size: 16px; padding-left: 20px;">
          <li>Draft 8 captions (GE1, GE2, Visual Proficiency, Visual Analysis, Color Guard, Brass, Music Analysis, Percussion) from any year in DCI history.</li>
          <li>Earn points from real DCI competition results as the season unfolds.</li>
          <li>Compete in public leaderboards or private leagues with friends.</li>
          <li>Level up your director profile and unlock higher divisions: SoundSport, Open Class, and World Class.</li>
        </ul>
        <h2 style="color: #EAB308; font-size: 20px; margin-top: 24px; margin-bottom: 8px;">Get started</h2>
        <p style="font-size: 16px;">
          <strong>This app requires JavaScript.</strong> Please enable JavaScript in your browser to play.
        </p>
        <p style="font-size: 16px;">
          <a href="/register" style="color: #0057B8; text-decoration: underline;">Create a free account</a>
          &nbsp;·&nbsp;
          <a href="/login" style="color: #0057B8; text-decoration: underline;">Sign in</a>
          &nbsp;·&nbsp;
          <a href="/preview" style="color: #0057B8; text-decoration: underline;">Preview the demo</a>
          &nbsp;·&nbsp;
          <a href="/privacy" style="color: #0057B8; text-decoration: underline;">Privacy</a>
          &nbsp;·&nbsp;
          <a href="/terms" style="color: #0057B8; text-decoration: underline;">Terms</a>
        </p>
      </div>
    </noscript>

    <!-- App Loader - Official Drill Grid Logo -->
    <div id="app-loader" class="app-loader">
      <div class="animate-pulse">
        <!-- Official Marching.art Drill Grid Logo -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 65 65">
          <g>
            <!-- The 9 Dots (Field Grid) - Gray markers -->
            <circle cx="0" cy="0" r="4" fill="#a0a0a0"/>
            <circle cx="25" cy="0" r="4" fill="#a0a0a0"/>
            <circle cx="50" cy="0" r="4" fill="#a0a0a0"/>
            <circle cx="0" cy="25" r="4" fill="#a0a0a0"/>
            <circle cx="25" cy="25" r="4" fill="#a0a0a0"/>
            <circle cx="50" cy="25" r="4" fill="#a0a0a0"/>
            <circle cx="0" cy="50" r="4" fill="#a0a0a0"/>
            <circle cx="25" cy="50" r="4" fill="#a0a0a0"/>
            <circle cx="50" cy="50" r="4" fill="#a0a0a0"/>
            <!-- The Drill Path - Gold stroke -->
            <path d="M 0 0 Q 50 0, 50 50" stroke="currentColor" stroke-width="6" fill="none" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <div class="app-loader-text">Initializing...</div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/index.jsx"></script>

    <!-- Remove loader once React hydrates -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          document.body.classList.add('app-loaded');
          setTimeout(function() {
            var loader = document.getElementById('app-loader');
            if (loader) loader.remove();
          }, 300);
        }, 100);
      });
    </script>
  </body>
</html>
